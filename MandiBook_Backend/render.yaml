services:
  - type: web
    name: mandibook-backend
    env: node
    buildCommand: "npm install"
    startCommand: "npm start"
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - fromDatabase:
          name: mandibook-db
          property: connectionString
          key: DATABASE_URL
